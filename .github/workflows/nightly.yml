name: Nightly Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate Self-Signed Certificate (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=Developer ID Application: Pig Cleaner (Self-Signed)"
          openssl pkcs12 -export -legacy -out cert.p12 -inkey key.pem -in cert.pem -password pass:dummy
          echo "CSC_LINK=cert.p12" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=dummy" >> $GITHUB_ENV

      - name: Build Application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly_v${{ github.run_number }}
          name: "🐷 Bản thử nghiệm mới nhất (Nightly v${{ github.run_number }})"
          body: |
            Bản build tự động mới nhất từ nhánh `master`.

            <details>
            <summary>🍏 <b>Dành cho macOS (Chip M1/M2/M3 và Intel)</b></summary>
            
            ⚠️ **Hướng dẫn cài đặt trên macOS (Quan trọng):**
            Vì ứng dụng là dự án mã nguồn mở (không có chứng chỉ trả phí của Apple), macOS có thể sẽ báo lỗi *"App is damaged and can't be opened"* khi bạn mở lần đầu. Để khắc phục, vui lòng làm theo các bước sau:
            
            1. Tải file `.dmg` phù hợp với máy của bạn.
            2. Kéo thả `pig-cleaner.app` vào thư mục **Applications** (Ứng dụng).
            3. Mở ứng dụng **Terminal** trên máy Mac.
            4. Chạy dòng lệnh sau và ấn Enter:
               ```bash
               xattr -cr /Applications/pig-cleaner.app
               ```
            5. Mở ứng dụng và trải nghiệm bình thường!
            </details>

            <details>
            <summary>🪟 <b>Dành cho Windows</b></summary>
            
            - Tải file `.exe` ở dưới và cài đặt bình thường.
            </details>
            
            📝 **Dành cho Lập trình viên:**
            Nếu bạn muốn tự custom, chỉnh sửa code và tự đóng gói (build) ứng dụng cho riêng mình, hãy xem hướng dẫn chi tiết tại [Trang chủ dự án (README)](https://github.com/tinyspirits/Pig-cleaner).
          prerelease: true
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
